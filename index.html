<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard do Plano de Ação Estratégico — Itapema/SC</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">

    <header class="bg-blue-600 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-6 sm:px-6 lg:px-8 flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tight">Plano de Ação Estratégico</h1>
            <span class="bg-blue-700 px-3 py-1 rounded-full text-sm font-semibold shadow-inner">Itapema / SC</span>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
        
        <div id="loading" class="text-center py-12">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-600 border-t-transparent mb-4"></div>
            <p class="text-gray-500 font-medium">Buscando dados em tempo real da planilha...</p>
        </div>

        <div id="dashboard-content" class="hidden space-y-8">
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-xl shadow-xs border border-gray-100 flex flex-col justify-between">
                    <span class="text-sm font-semibold text-gray-400 uppercase tracking-wider">Total de Ações</span>
                    <span id="kpi-total" class="text-4xl font-extrabold text-blue-600 mt-2">0</span>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-xs border border-gray-100 flex flex-col justify-between">
                    <span class="text-sm font-semibold text-gray-400 uppercase tracking-wider">Ações Concluídas</span>
                    <span id="kpi-concluido" class="text-4xl font-extrabold text-green-600 mt-2">0</span>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-xs border border-gray-100 flex flex-col justify-between">
                    <span class="text-sm font-semibold text-gray-400 uppercase tracking-wider">Em Andamento / Pendentes</span>
                    <span id="kpi-andamento" class="text-4xl font-extrabold text-amber-500 mt-2">0</span>
                </div>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-xs border border-gray-100 flex flex-col sm:flex-row gap-4 items-center justify-between">
                <div class="w-full sm:w-72 relative">
                    <input type="text" id="search-input" placeholder="Pesquisar em todas as colunas..." 
                        class="w-full pl-4 pr-4 py-2 border border-gray-200 rounded-lg focus:outline-hidden focus:ring-2 focus:ring-blue-500 text-sm">
                </div>
                <div class="text-xs text-gray-400 font-medium">
                    Atualizado automaticamente via Google Sheets
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-xs border border-gray-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse" id="data-table">
                        <thead class="bg-gray-50 border-b border-gray-100">
                            <tr id="table-headers">
                                </tr>
                        </thead>
                        <tbody id="table-rows" class="divide-y divide-gray-100">
                            </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <script>
        // Link CSV fornecido do seu Google Sheets
        const urlPlanilha = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRwB7C5i-i7-7T74L2w7lEWslwc6Z88_MP_HV1wmXfyqhIYWZ-sDmwwVTeBbJuKXxyYxZ-y71f_BEha/pub?output=csv";
        
        let dadosGlobais = [];

        function inicializarDashboard() {
            Papa.parse(urlPlanilha, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(resultado) {
                    dadosGlobais = resultado.data;
                    
                    // Esconde o loading e mostra o conteúdo
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('dashboard-content').classList.remove('hidden');
                    
                    renderizarDashboard(dadosGlobais);
                    configurarPesquisa();
                },
                error: function(erro) {
                    document.getElementById('loading').innerHTML = `
                        <p class="text-red-500 font-semibold">Erro ao carregar dados do Google Sheets.</p>
                        <p class="text-gray-400 text-sm mt-1">Verifique se a planilha continua publicada corretamente.</p>
                    `;
                    console.error(erro);
                }
            });
        }

        function renderizarDashboard(dados) {
            if (dados.length === 0) return;

            const colunas = Object.keys(dados[0]);
            
            // 1. Renderizar Cabeçalhos da Tabela
            const thContainer = document.getElementById('table-headers');
            thContainer.innerHTML = '';
            colunas.forEach(coluna => {
                const th = document.createElement('th');
                th.className = "px-6 py-4 text-xs font-bold uppercase tracking-wider text-gray-500";
                th.textContent = coluna;
                thContainer.appendChild(th);
            });

            // 2. Renderizar Linhas da Tabela
            renderizarLinhas(dados, colunas);

            // 3. Calcular e Atualizar Indicadores (KPIs)
            atualizarIndicadores(dados, colunas);
        }

        function renderizarLinhas(dados, colunas) {
            const tbody = document.getElementById('table-rows');
            tbody.innerHTML = '';

            dados.forEach(linha => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50/70 transition-colors";

                colunas.forEach(coluna => {
                    const td = document.createElement('td');
                    td.className = "px-6 py-4 text-sm text-gray-600 whitespace-nowrap";
                    
                    const valor = linha[coluna] || '';
                    
                    // Estilização visual básica para células que pareçam status
                    if (valor.toLowerCase() === 'concluído' || valor.toLowerCase() === 'concluido' || valor.toLowerCase() === 'feito') {
                        td.innerHTML = `<span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium bg-green-50 text-green-700">${valor}</span>`;
                    } else if (valor.toLowerCase() === 'em andamento' || valor.toLowerCase() === 'execução') {
                        td.innerHTML = `<span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium bg-amber-50 text-amber-700">${valor}</span>`;
                    } else if (valor.toLowerCase() === 'não iniciado' || valor.toLowerCase() === 'atrasado') {
                        td.innerHTML = `<span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium bg-red-50 text-red-700">${valor}</span>`;
                    } else {
                        td.textContent = valor;
                    }
                    
                    tr.appendChild(td);
                });

                tbody.appendChild(tr);
            });
        }

        function atualizarIndicadores(dados, colunas) {
            document.getElementById('kpi-total').textContent = dados.length;

            // Tenta encontrar uma coluna de Status de forma inteligente
            const colunaStatus = colunas.find(c => c.toLowerCase().includes('status') || c.toLowerCase().includes('situa') || c.toLowerCase().includes('fase'));

            if (colunaStatus) {
                let concluidos = 0;
                let emAndamento = 0;

                dados.forEach(linha => {
                    const val = (linha[colunaStatus] || '').toLowerCase();
                    if (val.includes('conclui') || val === 'feito' || val === 'ok') {
                        concluidos++;
                    } else if (val.trim() !== '') {
                        emAndamento++; // Considera qualquer outro status preenchido como pendente/andamento
                    }
                });

                document.getElementById('kpi-concluido').textContent = concluidos;
                document.getElementById('kpi-andamento').textContent = emAndamento;
            } else {
                // Caso não ache coluna de status, deixa valores padrão ou ocultos
                document.getElementById('kpi-concluido').textContent = "-";
                document.getElementById('kpi-andamento').textContent = "-";
            }
        }

        function configurarPesquisa() {
            const searchInput = document.getElementById('search-input');
            searchInput.addEventListener('input', function(e) {
                const termo = e.target.value.toLowerCase();
                
                if (!termo) {
                    renderizarDashboard(dadosGlobais);
                    return;
                }

                const colunas = Object.keys(dadosGlobais[0]);
                const dadosFiltrados = dadosGlobais.filter(linha => {
                    return colunas.some(coluna => {
                        return String(linha[coluna]).toLowerCase().includes(termo);
                    });
                });

                renderizarLinhas(dadosFiltrados, colunas);
            });
        }

        // Executa ao carregar a página
        window.addEventListener('DOMContentLoaded', inicializarDashboard);
    </script>
</body>
</html>
